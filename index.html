<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عرض المصحف</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f2e9;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 420px;
      margin: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    p {
      color: #555;
      line-height: 1.8;
      margin-bottom: 24px;
    }

    a {
      display: inline-block;
      padding: 14px 24px;
      background: #627536;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>مصحف مجمع الملك فهد</h1>
    <p>اضغط الزر لفتح المصحف في صفحة المجمع الرسمية.</p>

    <a href="https://qurancomplex.gov.sa/isdarat-hafs/#flipbook-df_11291/1/" target="_blank">
      فتح المصحف
    </a>
  </div>
</body>
</html>
